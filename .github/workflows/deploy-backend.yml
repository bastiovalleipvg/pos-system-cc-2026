name: Build and Push Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  REGISTRY_NAME: acrposdevops.azurecr.io
  IMAGE_NAME: pos-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ./backend
          docker push ${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
      - name: Instrucciones de Despliegue Manual
        run: |
          echo "========================================================================"
          echo "La imagen se ha subido exitosamente a Azure Container Registry."
          echo "Para desplegar estos cambios, ejecuta este comando en tu terminal local:"
          echo "az containerapp update --name app-backend-core --resource-group rg-prod-apps --image ${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "========================================================================"
